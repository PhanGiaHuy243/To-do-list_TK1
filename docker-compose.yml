version: '3.8'

services:
  app:
    build: .
    container_name: todolist_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./todolist.db
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  db:
    image: sqlite:latest
    container_name: todolist_db
    volumes:
      - ./db_data:/data
    environment:
      - SQLITE_DB=/data/todolist.db
